# Recording-only tmux config (derived from the maintainer's cyberdream theme,
# with the external #() status scripts stripped so it runs anywhere).
# Used on an isolated -L socket by recording/record.sh — never your real tmux.

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:Tc"
set -g status-interval 1
set -g escape-time 0
set -g history-limit 50000
set -g mouse off

# Keep the recorder's real shell rc (starship, direnv, update nags) off screen.
set -g default-command 'bash --noprofile --rcfile "$SIDEMUX_REPO/recording/panerc"'

# status bar — pill chips built from nerd-font half-circle glyphs
set -g status-style "fg=#cdd6f4,bg=default"
set -g status-position bottom
set -g status-justify left
set -g status-left-length 100
set -g status-right-length 100

# left: session chip (cyan)
set -g status-left "#[fg=#22d3ee,bg=default]#[fg=#11111b,bg=#22d3ee,bold]#S#[fg=#22d3ee,bg=default] "

# windows: glass chips with a darker number cap, current = mauve pill
set -g window-status-separator " "
set -g window-status-format "#[fg=#29293a,bg=default]#[fg=#cdd6f4,bg=#29293a,bold]#I #[fg=#6c7086,bg=#313244] #W#[fg=#313244,bg=default]"
set -g window-status-current-format "#[fg=#29293a,bg=default]#[fg=#cdd6f4,bg=#29293a,bold]#I #[fg=#11111b,bg=#cba6f7,bold] #W#[fg=#cba6f7,bg=default]"
set -g window-status-activity-style "fg=#22d3ee"

# right: clock chip (mauve)
set -g status-right "#[fg=#cba6f7,bg=default]#[fg=#11111b,bg=#cba6f7,bold]%H:%M#[fg=#cba6f7,bg=default]"

# panes
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#cba6f7"

# messages / prompts
set -g message-style "fg=#cba6f7,bg=#11111b,bold"
set -g message-command-style "fg=#22d3ee,bg=#11111b"
set -g mode-style "fg=#11111b,bg=#cba6f7,bold"
