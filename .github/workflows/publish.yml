name: Publish

# Publishes to npm when you push a version tag (e.g. `git tag v0.1.1 && git push --tags`).
# workflow_dispatch lets you re-run a publish by hand from the Actions tab.
on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # prepublishOnly runs the test suite; install tmux so integration tests run too.
      - name: Install tmux
        run: sudo apt-get update && sudo apt-get install -y tmux

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify tag matches package version
        if: github.ref_type == 'tag'
        run: |
          pkg="$(node -p "require('./package.json').version")"
          tag="${GITHUB_REF_NAME#v}"
          if [ "$pkg" != "$tag" ]; then
            echo "::error::package.json version ($pkg) does not match tag ($tag)"
            exit 1
          fi

      - name: Publish to npm
        run: pnpm publish --provenance --access public --no-git-checks
